<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blue Ocean 藍海茶飲</title>
    <style>
        :root { --blue: #0077be; --bg: #f0f8ff; }
        body { font-family: sans-serif; background: var(--bg); color: #333; text-align: center; margin: 0; }
        header { background: var(--blue); color: white; padding: 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .menu { display: flex; flex-wrap: wrap; justify-content: center; padding: 20px; }
        .item { background: white; border-radius: 15px; margin: 15px; padding: 20px; width: 220px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); border-top: 5px solid var(--blue); }
        button { background: var(--blue); color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        button:hover { background: #005a91; transform: scale(1.05); transition: 0.2s; }
    </style>
</head>
<body>
    <header>
        <h1>🌊 Blue Ocean 藍海茶飲</h1>
        <p>每一口都是沁涼的海洋氣息</p>
    </header>
    <div class="menu">
        <div class="item">
            <h3>深海珍珠奶茶</h3>
            <p>$60</p>
            <button onclick="addOrder('深海珍珠奶茶')">我要點餐</button>
        </div>
        <div class="item">
            <h3>海洋漂浮蘇打</h3>
            <p>$70</p>
            <button onclick="addOrder('海洋漂浮蘇打')">我要點餐</button>
        </div>
    </div>
    <script>
        function addOrder(name) {
            let orders = JSON.parse(localStorage.getItem('drink_orders') || '[]');
            orders.push({ name: name, time: new Date().toLocaleTimeString() });
            localStorage.setItem('drink_orders', JSON.stringify(orders));
            alert('【' + name + '】已送出訂單！');
        }
    </script>
</body>
</html>
